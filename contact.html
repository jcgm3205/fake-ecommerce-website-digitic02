<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitic02 - E-commerce | Contact </title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
        integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header class="header">
        <div class="header-hotline">
            <p class="header__phone">Hotline: (888) 4434-0006 - (888) 3918-8331</p>
        </div>
        <div class="header-mainstrip">

            <!-- Here is the burger-type button -->
            <button class="header__burgerbtn" id="burgerBtn">
                <i class="fa-solid fa-bars"></i>
            </button>

            <!-- Header Logo -->
            <h1 class="header__logo">
                <a href="/">Digitic02</a>
            </h1>

            <!-- Here are a group of links and buttons related with user options -->
            <nav class="header-usermenu">
                <a class="header__userlink" href="/compare"><i class="fa-solid fa-rotate"></i></a>
                <a class="header__userlink" href="/wishlist"><i class="fa-regular fa-heart"></i></a>
                <div class="header-user-cont">
                    <button class="header__userbtn"><i class="fa-regular fa-user"></i></button>
                </div>
                <div class="header-cart-cont">
                    <button class="header__cartbtn"><i class="fa-solid fa-cart-shopping"></i></button>
                </div>
            </nav>

        </div>
        <div class="header-bottomstrip">

            <!-- Here is the navigation bar of the website, based on categories -->
            <nav class="header-navmenu" id="navMenu">
                <button class="header__xmarkbtn" id="xMarkBtn"><i class="fa-solid fa-xmark"></i></button>
                <ul class="header-linklist">
                    <li class="header-listitem"><a class="header__link" href="/">Home</a></li>
                    <li class="header-listitem"><a class="header__link" href="/news.html">Latest News</a></li>
                    <li class="header-listitem"><a class="header__link" href="/contact.html">Contact</a></li>
                </ul>
                <div class="header-social-container">
                    <a href="https://www.twitter.com" class="header__sociallink">
                        <i class="fa-brands fa-twitter"></i>
                    </a>
                    <a href="https://www.facebook.com" class="header__sociallink">
                        <i class="fa-brands fa-square-facebook"></i>
                    </a>
                    <a href="https://www.pinterest.com" class="header__sociallink">
                        <i class="fa-brands fa-pinterest"></i>
                    </a>
                    <a href="https://www.instagram.com" class="header__sociallink">
                        <i class="fa-brands fa-instagram"></i>
                    </a>
                    <a href="https://www.youtube.com" class="header__sociallink">
                        <i class="fa-brands fa-youtube"></i>
                    </a>
                </div>
            </nav>

            <!-- Here is the search bar component -->
            <form class="header-searchbar-cont">
                <input class="header__search-input" type="text" name="query" id="query"
                    placeholder="Search Product Here...">
                <button class="header__glassbtn" type="submit">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>
        </div>
    </header>
    <main>
        <h2>Contact</h2>
    </main>
    <footer>

    </footer>

    <script src="js/scripts.js" type="module"></script>
</body>

</html>
